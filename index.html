<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>コンカフェレジ</title>
<style>
:root{
  --bg:#17141a; --panel:#221e27; --panel2:#2c2733; --line:#3a3442;
  --txt:#f2edf4; --sub:#a99fb3; --accent:#d6335c; --accent2:#e8b04b;
  --ok:#3fae6a; --warn:#e0a23c; --danger:#e05252;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;}
body{padding-bottom:70px;}
header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#2a1420,#1c1120);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
header .brand{font-weight:800;font-size:18px;color:var(--accent2);letter-spacing:.05em;}
header .store{background:var(--accent);color:#fff;border-radius:8px;padding:3px 10px;font-weight:700;font-size:14px;}
header .datebadge{color:var(--sub);font-size:12px;}
.badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;}
.badge.cos{background:var(--accent2);color:#2a1420;}
.badge.closed{background:var(--ok);color:#fff;}
header .spacer{flex:1;}
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.gold{background:var(--accent2);border-color:var(--accent2);color:#2a1420;}
.btn.ghost{background:transparent;}
.btn.danger{background:transparent;border-color:var(--danger);color:var(--danger);}
.btn.small{padding:5px 10px;font-size:12px;border-radius:8px;}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:#1b1720;border-top:1px solid var(--line);}
nav button{flex:1;background:none;border:none;color:var(--sub);padding:10px 2px 12px;font-size:11px;font-weight:700;cursor:pointer;}
nav button .ico{display:block;font-size:18px;margin-bottom:2px;}
nav button.act{color:var(--accent2);}
main{padding:12px;max-width:1100px;margin:0 auto;}
h2{font-size:16px;margin:14px 0 8px;color:var(--accent2);}
h3{font-size:14px;margin:12px 0 6px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.grow{flex:1;}
.muted{color:var(--sub);font-size:12px;}
.right{text-align:right;}
input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 10px;font-size:15px;max-width:100%;}
input[type=number]{width:110px;}
input[type=date]{width:160px;}
label.chk{display:flex;gap:6px;align-items:center;font-size:14px;}
.catbar{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;}
.catbar button{white-space:nowrap;border-radius:20px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.catbar button.act{background:var(--accent);border-color:var(--accent);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.itembtn{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 10px;cursor:pointer;text-align:left;color:var(--txt);min-height:64px;}
.itembtn:active{background:var(--panel2);}
.itembtn .nm{font-size:14px;font-weight:700;line-height:1.3;}
.itembtn .pr{color:var(--accent2);font-weight:800;margin-top:4px;}
.itembtn .tag{font-size:10px;color:var(--sub);}
#cartFab{position:fixed;right:14px;bottom:78px;z-index:25;background:var(--accent);color:#fff;border:none;border-radius:16px;padding:14px 18px;font-size:15px;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,.5);cursor:pointer;display:none;}
.modalback{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:40;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:700px){.modalback{align-items:center;}}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:16px;}
@media(min-width:700px){.modal{border-radius:18px;}}
.modal h2{margin-top:0;}
.line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
.line:last-child{border-bottom:none;}
.qtybtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:18px;font-weight:800;cursor:pointer;}
.total-lg{font-size:24px;font-weight:900;color:var(--accent2);}
.pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:8px 14px;margin:3px;cursor:pointer;font-size:13px;font-weight:700;color:var(--txt);}
.pill.act{background:var(--accent);border-color:var(--accent);color:#fff;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left;}
th{color:var(--sub);font-weight:600;font-size:11px;}
td.num,th.num{text-align:right;}
.txcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
.txcard.voided{opacity:.45;}
.txcard .top{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);}
.txcard .items{font-size:14px;margin:5px 0;}
.txcard .tot{font-weight:800;color:var(--accent2);}
.viewtabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;}
.viewtabs button{border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.viewtabs button.act{background:var(--accent2);border-color:var(--accent2);color:#2a1420;}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:var(--ok);color:#fff;padding:10px 20px;border-radius:12px;font-weight:700;z-index:60;display:none;}
.stat{display:inline-block;background:var(--panel2);border-radius:12px;padding:10px 14px;margin:4px;min-width:120px;}
.stat .v{font-size:20px;font-weight:900;color:var(--accent2);}
.stat .k{font-size:11px;color:var(--sub);}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);gap:8px;flex-wrap:wrap;}
.setrow:last-child{border-bottom:none;}
</style>
</head>
<body>
<header>
  <span class="brand">♠ CONCAFE REGI</span>
  <span class="store" id="hdStore">AG</span>
  <span class="datebadge" id="hdDate"></span>
  <span id="hdBadges"></span>
  <span class="spacer"></span>
  <button class="btn small" onclick="openDaySetup()">営業日設定</button>
</header>
<main id="main"></main>
<button id="cartFab" onclick="openCheckout()">🛒 0点 ¥0</button>
<nav id="nav">
  <button data-tab="reg" onclick="showTab('reg')"><span class="ico">🧾</span>レジ</button>
  <button data-tab="chip" onclick="showTab('chip')"><span class="ico">🪙</span>チップ</button>
  <button data-tab="hist" onclick="showTab('hist')"><span class="ico">📜</span>履歴</button>
  <button data-tab="rep" onclick="showTab('rep')"><span class="ico">📊</span>集計</button>
  <button data-tab="set" onclick="showTab('set')"><span class="ico">⚙️</span>設定</button>
</nav>
<div id="toast"></div>
<script>
'use strict';
/* ================= utils ================= */
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const yen=n=>'¥'+Number(n||0).toLocaleString('ja-JP');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
function ymdOf(d){const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
const qOf=ymd=>{const p=ymd.split('-');return p[0]+'Q'+(Math.floor((Number(p[1])-1)/3)+1);};
const hm=ts=>{const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
function toast(msg,bad){const t=$('#toast');t.textContent=msg;t.style.background=bad?'var(--danger)':'var(--ok)';t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',1800);}
function download(name,text,mime){const b=new Blob(["﻿"+text],{type:(mime||'text/csv')+';charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('コピーしました');}catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('コピーしました');}catch(e2){toast('コピー失敗',true);}ta.remove();}}

/* ================= IndexedDB ================= */
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('concafe-pos',1);
  r.onupgradeneeded=e=>{const d=e.target.result;
    const t=d.createObjectStore('tx',{keyPath:'id'});t.createIndex('ymd','ymd');t.createIndex('q','q');
    const c=d.createObjectStore('chip',{keyPath:'id'});c.createIndex('ymd','ymd');c.createIndex('q','q');
    d.createObjectStore('kv');
  };
  r.onsuccess=()=>{db=r.result;res();};
  r.onerror=()=>rej(r.error);
});}
const kvGet=(k,def)=>new Promise(res=>{const r=db.transaction('kv').objectStore('kv').get(k);r.onsuccess=()=>res(r.result===undefined?def:r.result);r.onerror=()=>res(def);});
const kvSet=(k,v)=>new Promise(res=>{const t=db.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=()=>res();});
const dbPut=(st,o)=>new Promise(res=>{const t=db.transaction(st,'readwrite');t.objectStore(st).put(o);t.oncomplete=()=>res();});
const dbDel=(st,k)=>new Promise(res=>{const t=db.transaction(st,'readwrite');t.objectStore(st).delete(k);t.oncomplete=()=>res();});
const byIdx=(st,idx,val)=>new Promise(res=>{const r=db.transaction(st).objectStore(st).index(idx).getAll(val);r.onsuccess=()=>res(r.result||[]);r.onerror=()=>res([]);});
const allOf=st=>new Promise(res=>{const r=db.transaction(st).objectStore(st).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>res([]);});

/* ================= state & seed ================= */
let S=null; // settings
let cart=[]; let cartDisc=[]; let curTab='reg'; let curCat=null; let repView='sum'; let repDate=ymdOf(); let histDate=ymdOf(); let chipType='buy';
function seedSettings(){
  const cat=(id,name)=>({id,name});
  const it=(name,price,cat,o)=>Object.assign({id:uid()+Math.random().toString(36).slice(2,5),name,price,cat,needCast:false,cosPrice:null,riskyPrice:null,stores:['AG','CQ'],active:true},o||{});
  return {
    ver:1, store:'AG',
    cats:[cat('c-adm','入場・セット'),cat('c-drink','ドリンク・フード'),cat('c-cheki','チェキ'),cat('c-cham','シャンパン・ボトル'),cat('c-nom','指名・卓・その他')],
    items:[
      it('入場料',1000,'c-adm',{cosPrice:1500}),
      it('観光セット 5,000',5000,'c-adm',{stores:['AG']}),
      it('観光セット 10,000',10000,'c-adm',{stores:['AG']}),
      it('アフター8パスポート(土日20時〜)',3000,'c-adm',{stores:['AG']}),
      it('ソフトドリンク・おつまみ',500,'c-drink'),
      it('レッドブル・ボンボン',600,'c-drink'),
      it('酒・クライナー・メイオリ',700,'c-drink'),
      it('レッドブル割り',800,'c-drink'),
      it('お弁当(ソフドリ1杯付)',1000,'c-drink'),
      it('キャスドリ',1000,'c-drink',{needCast:true}),
      it('チェキ(撮影のみ)',700,'c-cheki',{needCast:true,riskyPrice:1500}),
      it('チェキ(ラクガキ付き)',1000,'c-cheki',{needCast:true,riskyPrice:1500}),
      it('デジタルチェキ',1000,'c-cheki',{needCast:true}),
      it('デカチェキ(コスデー特典)',0,'c-cheki',{needCast:true}),
      it('シャンメリー',5000,'c-cham'),
      it('White Tea',10000,'c-cham'),
      it('スパークリングTea',10000,'c-cham'),
      it('イベントボトル 10,000',10000,'c-cham'),
      it('イベントボトル 12,000',12000,'c-cham'),
      it('イベントシャンパン 15,000',15000,'c-cham'),
      it('マバム',18000,'c-cham'),
      it('1688',20000,'c-cham'),
      it('オリシャン白',20000,'c-cham'),
      it('イベントシャンパン 20,000',20000,'c-cham'),
      it('ヴーヴクリコ',30000,'c-cham'),
      it('オリシャン黒',30000,'c-cham'),
      it('ソフトクリーム',30000,'c-cham'),
      it('モエN.I.R.',50000,'c-cham'),
      it('ドンペリニヨン',80000,'c-cham'),
      it('フィリコ',100000,'c-cham'),
      it('ベルエポック',100000,'c-cham'),
      it('フィリコ羽根つき',120000,'c-cham'),
      it('アルマンドゴールド',150000,'c-cham'),
      it('エンジェル',250000,'c-cham'),
      it('ディーラー指名(30分)',2000,'c-nom',{needCast:true}),
      it('コンプカード',1000,'c-nom'),
      it('バカラデッキ',3000,'c-nom'),
      it('貸しテーブル(1時間)',10000,'c-nom'),
      it('バカラ指名セット',5000,'c-nom',{needCast:true})
    ],
    casts:[{id:uid()+'a',name:'A',store:'AG'},{id:uid()+'b',name:'B',store:'AG'},{id:uid()+'c',name:'C',store:'AG'},{id:uid()+'d',name:'D',store:'AG'},{id:uid()+'e',name:'E',store:'AG'}],
    pays:['現金','カード','QR','無料チケット','その他'],
    discPresets:[],
    chipPresets:{
      buy:[{yen:2000,chips:150,note:'初回のみ'},{yen:3000,chips:300,note:''},{yen:5000,chips:600,note:'おすすめ'},{yen:10000,chips:1500,note:'+30分指名券'}],
      draw:[{yen:2000,chips:300,note:''},{yen:3000,chips:500,note:''},{yen:5000,chips:1000,note:'おすすめ'},{yen:10000,chips:2500,note:'+30分指名券'}]
    },
    days:{}, gameids:[], shiftUrl:{AG:'',CQ:''}, shiftCache:{}
  };
}
async function loadS(){S=await kvGet('settings',null);if(!S){S=seedSettings();await saveS();}
  if(!S.shiftUrl)S.shiftUrl={AG:'',CQ:''};
  if(!S.shiftCache)S.shiftCache={};}
async function saveS(){await kvSet('settings',S);}
const dayKey=(ymd)=>S.store+'|'+ymd;
function getDay(ymd){return S.days[dayKey(ymd||ymdOf())]||{mode:'normal',att:{},closedAt:null};}
function setDay(ymd,d){S.days[dayKey(ymd||ymdOf())]=d;saveS();}
const storeItems=()=>S.items.filter(i=>i.active&&i.stores.indexOf(S.store)>=0);
const storeCasts=()=>S.casts.filter(c=>c.store===S.store);
function castName(id){const c=S.casts.find(x=>x.id===id);return c?c.name:'';}
function isRisky(castId,ymd){const d=getDay(ymd);return !!(d.att[castId]&&d.att[castId].risky);}
function unitPrice(item,castId){const d=getDay();let p=item.price;
  if(d.mode==='cos'&&item.cosPrice!=null)p=item.cosPrice;
  if(castId&&item.riskyPrice!=null&&d.mode==='cos'&&isRisky(castId))p=item.riskyPrice;
  return p;}
function rememberGameId(g){if(!g)return;S.gameids=[g].concat(S.gameids.filter(x=>x!==g)).slice(0,50);saveS();}

/* ================= modal ================= */
function openModal(html){closeModal();const back=document.createElement('div');back.className='modalback';back.id='modalback';
  back.innerHTML='<div class="modal">'+html+'</div>';
  back.addEventListener('click',e=>{if(e.target===back)closeModal();});
  document.body.appendChild(back);}
function closeModal(){const m=$('#modalback');if(m)m.remove();}

/* ================= header ================= */
function renderHeader(){$('#hdStore').textContent=S.store;
  const d=getDay();
  $('#hdDate').textContent=ymdOf();
  let b='';
  if(d.mode==='cos')b+='<span class="badge cos">コスデー</span> ';
  if(d.closedAt)b+='<span class="badge closed">店閉め済</span>';
  $('#hdBadges').innerHTML=b;}

/* ================= day setup ================= */
function openDaySetup(){const d=getDay();const casts=storeCasts();
  let rows=casts.map(c=>{const a=d.att[c.id]||{on:false,risky:false};
    return '<div class="line"><label class="chk grow"><input type="checkbox" data-att="'+c.id+'" '+(a.on?'checked':'')+'> '+esc(c.name)+(a.time?' <span class="muted">'+esc(a.time)+'</span>':'')+'</label>'
      +'<label class="chk muted"><input type="checkbox" data-risky="'+c.id+'" '+(a.risky?'checked':'')+'> 際どい衣装(チェキ1,500円)</label></div>';}).join('');
  openModal('<h2>営業日設定 ('+ymdOf()+' / '+S.store+')</h2>'
    +'<div class="row"><span class="pill '+(d.mode==='normal'?'act':'')+'" onclick="setDayMode(\'normal\')">通常営業</span>'
    +'<span class="pill '+(d.mode==='cos'?'act':'')+'" onclick="setDayMode(\'cos\')">コスデー</span></div>'
    +'<p class="muted">コスデーにすると入場料などコスデー価格が設定された商品は自動で切り替わります。</p>'
    +'<h3>出勤キャスト</h3>'
    +'<div class="row" style="margin-bottom:6px"><button class="btn small gold" onclick="openShiftApply()">📋 シフトから自動入力</button></div>'
    + (rows||'<p class="muted">キャストが未登録です。設定タブから追加するか、シフトから自動入力してください。</p>')
    +'<div class="row" style="margin-top:12px"><button class="btn primary grow" onclick="saveDaySetup()">保存</button></div>');
}
function setDayMode(m){const d=getDay();d.mode=m;setDay(null,d);openDaySetup();renderHeader();renderTab();}
function saveDaySetup(){const d=getDay();
  document.querySelectorAll('[data-att]').forEach(el=>{const id=el.getAttribute('data-att');d.att[id]=d.att[id]||{on:false,risky:false};d.att[id].on=el.checked;});
  document.querySelectorAll('[data-risky]').forEach(el=>{const id=el.getAttribute('data-risky');d.att[id]=d.att[id]||{on:false,risky:false};d.att[id].risky=el.checked;});
  setDay(null,d);closeModal();renderHeader();toast('保存しました');renderTab();}

/* ================= shift import ================= */
function parseCSVText(text){const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=ch;}
    else if(ch==='"')inQ=true;
    else if(ch===','){row.push(cur);cur='';}
    else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
    else if(ch==='\r'){}
    else cur+=ch;}
  row.push(cur);rows.push(row);return rows;}
function gridFromText(text){if(text.indexOf('\t')>=0)return text.replace(/\r/g,'').split('\n').map(l=>l.split('\t'));return parseCSVText(text);}
function fmtHour(v){const n=parseFloat(v);if(isNaN(n))return String(v);const h=Math.floor(n),m=Math.round((n-h)*60);return h+':'+String(m).padStart(2,'0');}
function inferYmd(mon,day){const now=new Date();let y=now.getFullYear();
  let c=new Date(y,mon-1,day);const dd=(c-now)/86400000;
  if(dd>183)y--;else if(dd<-183)y++;
  return ymdOf(new Date(y,mon-1,day));}
const SHIFT_STOP=['メモ','ヘルプ','イベント','実数','規定','差','出勤','退勤','備考','お当番','CQ','AG','平日','休日','番号','誕生日','名前','キャスト'];
function shiftSkipName(v){return !v||SHIFT_STOP.indexOf(v)>=0||/^event$/i.test(v)||/^[0-9.,:\/×x○◯△〜~\-\s]+$/.test(v)||/^[A-Za-z]{1,4}\d+$/.test(v);}
function parseShiftGrid(g){
  const strong=/(\d{1,2})\/(\d{1,2})\s*[（(]?[月火水木金土日]/;
  const plain=/^\s*(\d{1,2})\/(\d{1,2})\s*$/;
  let dateRow=-1,dates=[];
  for(let r=0;r<g.length;r++){const hits=[];
    g[r].forEach((c,i)=>{const m=String(c).match(strong);if(m)hits.push({col:i,mon:+m[1],day:+m[2]});});
    if(hits.length){dateRow=r;dates=hits;break;}}
  if(dateRow<0){for(let r=0;r<g.length;r++){const hits=[];
    g[r].forEach((c,i)=>{const m=String(c).match(plain);if(m)hits.push({col:i,mon:+m[1],day:+m[2]});});
    if(hits.length>=2){dateRow=r;dates=hits;break;}}}
  if(dateRow<0)return null;
  let depRow=-1,depCols=[];
  for(let r=dateRow+1;r<g.length&&r<=dateRow+12;r++){const cols=[];
    g[r].forEach((c,i)=>{if(String(c).trim()==='出勤')cols.push(i);});
    if(cols.length){depRow=r;depCols=cols;break;}}
  if(depRow<0)return null;
  const blocks=depCols.map(c=>{let best=null;
    dates.forEach(d2=>{if(d2.col<=c+2&&(!best||d2.col>best.col))best=d2;});
    let end=c+1;const hdr=g[depRow];
    for(let i=c+1;i<hdr.length&&i<=c+4;i++){if(String(hdr[i]).trim()==='退勤'){end=i;break;}}
    return best?{dep:c,ret:end,ymd:inferYmd(best.mon,best.day)}:null;}).filter(Boolean);
  if(!blocks.length)return null;
  const firstDep=Math.min.apply(null,depCols);
  const castNames=S.casts.map(c=>c.name);
  let nameCol=-1,bestScore=0;
  for(let col=0;col<firstDep;col++){let sc=0;
    for(let r=depRow+1;r<g.length;r++){const v=String((g[r]||[])[col]||'').trim();
      if(shiftSkipName(v))continue;
      sc+=(castNames.indexOf(v)>=0)?6:(/[぀-ヿ一-鿿]/.test(v)?2:1);}
    if(sc>bestScore){bestScore=sc;nameCol=col;}}
  if(nameCol<0)return null;
  const out={};
  for(let r=depRow+1;r<g.length;r++){const name=String((g[r]||[])[nameCol]||'').trim();
    if(shiftSkipName(name))continue;
    blocks.forEach(b=>{const st=String((g[r]||[])[b.dep]||'').trim();
      if(!st||!/^[0-9]/.test(st))return;
      const en=String((g[r]||[])[b.ret]||'').trim();
      (out[b.ymd]=out[b.ymd]||[]).push({name,start:st,end:en});});}
  return out;
}
async function importShiftText(text){const g=gridFromText(text);const parsed=g?parseShiftGrid(g):null;
  if(!parsed||!Object.keys(parsed).length){toast('シフトを読み取れませんでした。範囲にキャスト名列と日付・出勤の行が含まれているか確認してください',true);return false;}
  S.shiftCache[S.store]=S.shiftCache[S.store]||{dates:{}};
  Object.assign(S.shiftCache[S.store].dates,parsed);
  S.shiftCache[S.store].updatedAt=Date.now();
  await saveS();
  const ks=Object.keys(parsed).sort();
  toast('シフト取込: '+ks[0]+' 〜 '+ks[ks.length-1]);
  return true;}
function shiftCsvUrl(url){url=url.trim();
  if(/docs\.google\.com\/spreadsheets/.test(url)){
    if(url.indexOf('output=csv')>=0)return url;
    if(url.indexOf('/pub')>=0)return url+(url.indexOf('?')>=0?'&':'?')+'output=csv';
    const m=url.match(/\/spreadsheets\/d\/([\w-]+)/);const gm=url.match(/[#&?]gid=(\d+)/);
    if(m)return 'https://docs.google.com/spreadsheets/d/'+m[1]+'/gviz/tq?tqx=out:csv'+(gm?'&gid='+gm[1]:'');
  }
  return url;}
async function fetchShiftFromUrl(){const url=(S.shiftUrl||{})[S.store]||'';
  if(!url){toast('先に「設定 > シフト取り込み」でURLを保存してください',true);return false;}
  try{const r=await fetch(shiftCsvUrl(url));
    if(!r.ok)throw new Error('http '+r.status);
    const t=await r.text();
    if(/<html/i.test(t.slice(0,300)))throw new Error('not csv');
    const ok=await importShiftText(t);
    if(ok&&curTab==='set')renderSet();
    return ok;}
  catch(e){alert('自動取得できませんでした。\nスプレッドシートが「ファイル > 共有 > ウェブに公開」でCSV公開されているか確認するか、コピペ取り込みをご利用ください。');return false;}}

async function dayData(ymd){const txs=(await byIdx('tx','ymd',ymd)).filter(t=>t.store===S.store&&!t.voided);
  const chips=(await byIdx('chip','ymd',ymd)).filter(r=>r.store===S.store);return {txs,chips};}
function aggr(txs){
  const items={},casts={},pays={};let total=0,disc=0,count=txs.length;
  txs.forEach(t=>{total+=t.total;disc+=t.discountTotal;
    pays[t.pay]=(pays[t.pay]||0)+t.total;
    t.lines.forEach(l=>{const k=l.name;items[k]=items[k]||{qty:0,amt:0};items[k].qty+=l.qty;items[k].amt+=l.unit*l.qty;
      if(l.castName){casts[l.castName]=casts[l.castName]||{qty:0,amt:0};casts[l.castName].qty+=l.qty;casts[l.castName].amt+=l.unit*l.qty;}});});
  return {items,casts,pays,total,disc,count};
}

function tsvEscape(v){v=String(v==null?'':v);return v.replace(/\t/g,' ').replace(/\r?\n/g,' ');}
function toTSV(rows){return rows.map(r=>r.map(tsvEscape).join('\t')).join('\n');}
function toCSV(rows){return rows.map(r=>r.map(v=>{v=String(v==null?'':v);return (/[",\n]/.test(v))?'"'+v.replace(/"/g,'""')+'"':v;}).join(',')).join('\r\n');}
async function exportDay(how,kind){const {txs,chips,label}=await repData();
  let rows;
  if(kind==='detail'){
    rows=[['日付','時刻','店舗','種別','会計ID','商品/内容','数量','単価','金額','キャスト','支払方法','GAMEID','メモ']];
    txs.slice().sort((a,b)=>a.ts-b.ts).forEach(t=>{
      t.lines.forEach(l=>rows.push([t.ymd,hm(t.ts),t.store,'会計',t.id,l.name,l.qty,l.unit,l.unit*l.qty,l.castName||'',t.pay,t.gameId||'','']));
      t.discounts.forEach(d=>rows.push([t.ymd,hm(t.ts),t.store,'割引',t.id,d.name,1,-d.amount,-d.amount,'',t.pay,t.gameId||'','']));
    });
    chips.slice().sort((a,b)=>a.ts-b.ts).forEach(c=>rows.push([c.ymd,hm(c.ts),c.store,(c.type==='buy'?'チップ購入':'チップ引出し'),c.id,'$'+c.chips,1,c.yen,c.yen,'','',c.gameId||'',c.note||'']));
  }else{
    const a=aggr(txs);
    rows=[['集計対象',label,'店舗',S.store],[],['総売上',a.total],['会計数',a.count],['割引合計',a.disc],[],['支払方法','金額']];
    Object.keys(a.pays).forEach(p=>rows.push([p,a.pays[p]]));
    rows.push([],['商品','数量','金額']);
    Object.keys(a.items).sort((x,y)=>a.items[y].amt-a.items[x].amt).forEach(k=>rows.push([k,a.items[k].qty,a.items[k].amt]));
    rows.push([],['キャスト','数量','売上(担当分)']);
    Object.keys(a.casts).sort((x,y)=>a.casts[y].amt-a.casts[x].amt).forEach(k=>rows.push([k,a.casts[k].qty,a.casts[k].amt]));
    const buys=chips.filter(c=>c.type==='buy'),draws=chips.filter(c=>c.type==='draw');
    rows.push([],['チップ購入 件数',buys.length,'金額計',buys.reduce((x,y)=>x+y.yen,0),'チップ計',buys.reduce((x,y)=>x+y.chips,0)]);
    rows.push(['チップ引出し 件数',draws.length,'金額計',draws.reduce((x,y)=>x+y.yen,0),'チップ計',draws.reduce((x,y)=>x+y.chips,0)]);
  }
  const fname=S.store+'_'+label.replace(/[^0-9A-Za-z]/g,'')+'_'+(kind==='detail'?'明細':'集計');
  if(how==='copy')await copyText(toTSV(rows));
  else download(fname+'.csv',toCSV(rows));
}

function delDisc(i){S.discPresets.splice(i,1);saveS();renderDiscMgr();}
function renderChipMgr(){const el=$('#chipMgr');
  const sec=(key,label)=>'<b>'+label+'</b>'+S.chipPresets[key].map((p,i)=>'<div class="setrow"><span>'+yen(p.yen)+' → $'+p.chips.toLocaleString()+(p.note?' ('+esc(p.note)+')':'')+'</span><span><button class="btn small" onclick="editChipPre(\''+key+'\','+i+')">編集</button> <button class="btn small danger" onclick="delChipPre(\''+key+'\','+i+')">削除</button></span></div>').join('')
    +'<button class="btn small" style="margin:4px 0 10px" onclick="editChipPre(\''+key+'\',-1)">＋ 追加</button>';
  el.innerHTML=sec('buy','チップ購入')+sec('draw','チップ引出し');}
function editChipPre(key,i){const p=i>=0?S.chipPresets[key][i]:{yen:0,chips:0,note:''};
  const y=prompt('金額(円)',p.yen);if(y===null)return;const c=prompt('チップ($)',p.chips);if(c===null)return;const n=prompt('注記(任意)',p.note||'');
  const obj={yen:Number(y)||0,chips:Number(c)||0,note:(n||'').trim()};
  if(i>=0)S.chipPresets[key][i]=obj;else S.chipPresets[key].push(obj);
  S.chipPresets[key].sort((a,b)=>a.yen-b.yen);saveS();renderChipMgr();}
function delChipPre(key,i){S.chipPresets[key].splice(i,1);saveS();renderChipMgr();}
function renderPayMgr(){const el=$('#payMgr');
  el.innerHTML=S.pays.map((p,i)=>'<div class="setrow"><span>'+esc(p)+'</span>'+(S.pays.length>1?'<button class="btn small danger" onclick="delPay('+i+')">削除</button>':'')+'</div>').join('');}
function addPay(){const v=$('#newPay').value.trim();if(!v)return;if(S.pays.indexOf(v)<0)S.pays.push(v);saveS();renderPayMgr();$('#newPay').value='';}
function delPay(i){S.pays.splice(i,1);saveS();renderPayMgr();}
async function backupAll(){const data={settings:S,tx:await allOf('tx'),chip:await allOf('chip'),exportedAt:new Date().toISOString()};
  download('レジバックアップ_'+ymdOf()+'.json',JSON.stringify(data),'application/json');}
function restoreAll(input){const f=input.files[0];if(!f)return;
  if(!confirm('バックアップを読み込むと、現在の設定とデータに追加・上書きされます。よろしいですか?'))return;
  const r=new FileReader();
  r.onload=async()=>{try{const data=JSON.parse(r.result);
    if(data.settings){S=data.settings;await saveS();}
    for(const t of (data.tx||[]))await dbPut('tx',t);
    for(const c of (data.chip||[]))await dbPut('chip',c);
    toast('読み込みました');renderHeader();renderSet();
  }catch(e){toast('読み込みに失敗しました',true);}};
  r.readAsText(f);}
async function exportQuarterCsv(){const q=$('#delQuarter').value;if(!q){toast('四半期を選択してください',true);return;}
  const txs=(await byIdx('tx','q',q)).filter(t=>t.store===S.store);
  const chips=(await byIdx('chip','q',q)).filter(r=>r.store===S.store);
  const rows=[['日付','時刻','店舗','種別','会計ID','商品/内容','数量','単価','金額','キャスト','支払方法','GAMEID','取消','メモ']];
  txs.sort((a,b)=>a.ts-b.ts).forEach(t=>{
    t.lines.forEach(l=>rows.push([t.ymd,hm(t.ts),t.store,'会計',t.id,l.name,l.qty,l.unit,l.unit*l.qty,l.castName||'',t.pay,t.gameId||'',t.voided?'取消':'','']));
    t.discounts.forEach(d=>rows.push([t.ymd,hm(t.ts),t.store,'割引',t.id,d.name,1,-d.amount,-d.amount,'',t.pay,t.gameId||'',t.voided?'取消':'','']));
  });
  chips.sort((a,b)=>a.ts-b.ts).forEach(c=>rows.push([c.ymd,hm(c.ts),c.store,(c.type==='buy'?'チップ購入':'チップ引出し'),c.id,'$'+c.chips,1,c.yen,c.yen,'','',c.gameId||'','',c.note||'']));
  download(S.store+'_'+q+'_明細.csv',toCSV(rows));}
async function deleteQuarter(){const q=$('#delQuarter').value;if(!q){toast('四半期を選択してください',true);return;}
  if(!confirm(q+' の '+S.store+' のデータを端末から削除します。CSVやバックアップは書き出し済みですか?'))return;
  if(!confirm('本当に削除しますか?この操作は取り消せません。'))return;
  const txs=(await byIdx('tx','q',q)).filter(t=>t.store===S.store);
  const chips=(await byIdx('chip','q',q)).filter(r=>r.store===S.store);
  for(const t of txs)await dbDel('tx',t.id);
  for(const c of chips)await dbDel('chip',c.id);
  toast('削除しました');renderSet();}

/* ================= init ================= */
(async function(){
  await openDB();await loadS();
  renderHeader();showTab('reg');
})();
</script>
